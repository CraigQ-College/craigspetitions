<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Petition</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container mt-5">
  <h2>Search for a Petition</h2>
  <form th:action="@{/searchResults}" method="get" class="border p-4 rounded bg-white shadow-sm">
    <div class="mb-3">
      <label for="query" class="form-label">Search</label>
      <input type="text" id="query" name="query" class="form-control" placeholder="Enter search term" required>
    </div>
    <button type="submit" class="btn btn-primary">Search</button>
  </form>
  <a href="/allPetitions" class="btn btn-secondary mt-4">Back to All Petitions</a>
</div>
</body>
</html>
